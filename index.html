<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relax Zone</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
    --bg:#111d72;
    --card-radius:32px;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    overflow:hidden;
    border-radius:var(--card-radius);
    margin-bottom:24px;
    cursor:pointer;
    background:#222;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}

.card:hover img{
    transform:scale(1.05);
}

.overlay{
    position:absolute;
    inset:0;
    background:
        linear-gradient(
            to top,
            rgba(0,0,0,.75),
            rgba(0,0,0,.25),
            rgba(0,0,0,.1)
        );
}

.favorite{
    position:absolute;
    right:18px;
    top:18px;
    width:62px;
    height:62px;
    border:none;
    border-radius:20px;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:3;
}

.content{
    position:absolute;
    left:28px;
    right:28px;
    bottom:28px;
    z-index:2;
}

.title{
    color:white;
    font-size:48px;
    font-weight:800;
    line-height:1;
    margin-bottom:12px;
}

.description{
    color:rgba(255,255,255,.92);
    font-size:24px;
    line-height:1.3;
    max-width:80%;
}

@media(max-width:768px){

    .title{
        font-size:34px;
    }

    .description{
        font-size:18px;
        max-width:95%;
    }

    .favorite{
        width:54px;
        height:54px;
        font-size:24px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="card">
        <img src="./video.png" alt="Видео">
        <div class="overlay"></div>
        <button class="favorite">☆</button>
        <div class="content">
            <div class="title">
                Видео
            </div>
            <div class="description">
                Генерация видео и изменение существующего видео.
            </div>
        </div>
    </div>

    <div class="card">
        <img src="./risunok.png" alt="Рисунок">
        <div class="overlay"></div>
        <button class="favorite">☆</button>
        <div class="content">
            <div class="title">
                Рисунок
            </div>
            <div class="description">
                Преобразование и дополнение рисунка.
            </div>
        </div>
    </div>

    <div class="card">
        <img src="./photo.png" alt="Фото">
        <div class="overlay"></div>
        <button class="favorite">☆</button>
        <div class="content">
            <div class="title">
                Фото генерация
            </div>
            <div class="description">
                Генерация и преобразование фотографии.
            </div>
        </div>
    </div>

    <div class="card">
        <img src="./school.png" alt="Учебный материал">
        <div class="overlay"></div>
        <button class="favorite">☆</button>
        <div class="content">
            <div class="title">
                Учебный материал
            </div>
            <div class="description">
                Углубленное погружение в материал.
            </div>
        </div>
    </div>

</div>

<script>

document.querySelectorAll("img").forEach(img => {
    img.onerror = function() {
        this.src = "https://placehold.co/800x600/png?text=Image+Not+Found";
    };
});

const tg = window.Telegram.WebApp;
tg.expand();

document.querySelectorAll('.favorite').forEach(btn => {
    btn.addEventListener('click', () => {
        btn.textContent = btn.textContent === '☆' ? '★' : '☆';
    });
});

</script>

</body>
</html>
